version: 1
applications:
  - appRoot: apps/site
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - nvm use 20
            - npm install -g pnpm@10.24.0
            - pnpm install --frozen-lockfile --filter @wonju-bus/site...
        build:
          commands:
            - pnpm --filter @wonju-bus/site build
      artifacts:
        baseDirectory: apps/site/.next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - apps/site/.next/cache/**/*
